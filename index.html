    <script type="text/babel">
        const { useState, useEffect } = React;

       
       
        // 사용자 행동 트래킹
        const trackUserAction = (action, data) => {
            const event = {
                timestamp: new Date().toISOString(),
                action: action,
                data: data,
                sessionId: sessionStorage.getItem('sessionId') || Math.random().toString(36).substr(2, 9)
            };
            
            if (!sessionStorage.getItem('sessionId')) {
                sessionStorage.setItem('sessionId', event.sessionId);
            }
            
            console.log('📊 User Action Tracked:', event);
        };


        // ============================================
        // 🔥 API 헬퍼 함수
        // ============================================
        
        // JWT 토큰 관리
        const TokenManager = {
            setToken: (token) => {
                localStorage.setItem('jwt_token', token);
            },
            getToken: () => {
                return localStorage.getItem('jwt_token');
            },
            removeToken: () => {
                localStorage.removeItem('jwt_token');
            },
            getAuthHeaders: () => {
                const token = TokenManager.getToken();

    // 결제 처리 (Payment API)
    processPayment: async (orderId, paymentMethod, cardData = null) => {
        try {
            // UUID v4 생성 (idempotency key)
            const idempotencyKey = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });

            const requestBody = {
                order_id: parseInt(orderId),
                payment_method: String(paymentMethod),
                idempotency_key: String(idempotencyKey)
            };
            
            // 카드 정보 추가 (있는 경우)
            if (cardData) {
                requestBody.card_data = {
                    card_number: String(cardData.card_number || ''),
                    card_holder: String(cardData.card_holder || ''),
                    expiry: String(cardData.expiry || ''),
                    cvv: String(cardData.cvv || ''),
                    saved_card_id: cardData.saved_card_id ? parseInt(cardData.saved_card_id) : undefined
                };
            }

            // 토큰 확인
            const token = TokenManager.getToken();
            console.log('🔐 현재 토큰:', token ? token.substring(0, 20) + '...' : '없음');
            
            const headers = TokenManager.getAuthHeaders();
            console.log('📋 요청 헤더:', {
                'Content-Type': headers['Content-Type'],
                'Authorization': headers['Authorization'] ? headers['Authorization'].substring(0, 30) + '...' : '없음'
            });

            console.log('📤 Payment API 요청:', {
                url: 'http://localhost:3004/payments',
                method: 'POST',
                body: requestBody
            });

            let requestBodyJson;
            try {
                requestBodyJson = JSON.stringify(requestBody);
                console.log('✅ JSON 직렬화 성공');
            } catch (jsonError) {
                console.error('❌ JSON 직렬화 실패:', jsonError);
                throw new Error('요청 데이터 변환 실패: ' + jsonError.message);
            }

            const response = await fetch('http://localhost:3004/payments', {
                method: 'POST',
                headers: headers,
                body: requestBodyJson
            });
            
            console.log('📥 Payment API 응답 상태:', response.status);
            
            // 401 에러 시 토큰 만료 처리
            if (response.status === 401) {
                TokenManager.removeToken();
                throw new Error('로그인이 필요합니다. 다시 로그인해주세요.');
            }
            
            if (!response.ok) {
                const err = await response.json();
                console.error('❌ 결제 API 에러 (상태: ' + response.status + '):', err);
                throw new Error(err.message || err.error_message || '결제 처리에 실패했습니다.');
            }
            const result = await response.json();
            console.log('✅ 결제 API 응답:', result);
            return result;
        } catch (error) {
            console.error('❌ Payment API 호출 실패:', error);
            throw error;
        }

                            }

                    setProducts(Storage.getProducts());

                if (product.stock === 0) {
                    alert('재고가 없습니다.');
                    return;
                }

                const existingItem = cart.find(item => item.id === product.id);
                
                if (existingItem) {
                    if (existingItem.quantity >= product.stock) {
                        alert('재고가 부족합니다.');
                        return;
                    }
                    setCart(cart.map(item =>
                        item.id === product.id
                            ? { ...item, quantity: item.quantity + 1 }
                            : item
                    ));
                } else {
                    setCart([...cart, { ...product, quantity: 1 }]);
                }

                trackUserAction('add_to_cart', {
                    productId: product.id,
                    productName: product.name,
                    price: product.price
                });
            };

            const updateQuantity = (productId, change) => {
                setCart(cart.map(item => {
                    if (item.id === productId) {
                        const newQuantity = Math.max(1, item.quantity + change);
                        const product = products.find(p => p.id === productId);
                        return { ...item, quantity: Math.min(newQuantity, product.stock) };
                    }
                    return item;
                }));
            };

                setCart(cart.filter(item => item.id !== productId));

                                                    placeholder="1234 5678 9012 3456"

                                            <div className="form-group">

                                                <input
                                                    type="text"
                                                    className="form-input"
                                                    value={newCard.card_holder}
                                                    onChange={(e) => {
                                                        const value = e.target.value.toUpperCase();
                                                        setNewCard({...newCard, card_holder: value});

                                                    placeholder="HONG GILDONG"
                                                    required
                                                    style={{ 
                                                        textTransform: 'uppercase',
                                                        letterSpacing: '0.05em'
                                                    }}
                                                />
                                            </div>

                                            {/* 만료일과 CVV */}
                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                                                <div className="form-group">
                                                    <label className="form-label">만료일</label>
                                                    <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                                                        <input
                                                            type="text"
                                                            className="form-input"
                                                            value={newCard.expiry_month || ''}
                                                            onChange={(e) => {
                                                                let value = e.target.value.replace(/\D/g, '');
                                                                if (value.length > 2) value = value.slice(0, 2);
                                                                const num = parseInt(value);
                                                                if (value === '' || (num >= 1 && num <= 12)) {
                                                                    setNewCard({...newCard, expiry_month: value});
                                                                }
                                                            }}
                                                            placeholder="MM"
                                                            maxLength="2"
                                                            required
                                                            style={{ 
                                                                fontSize: '1.1rem',
                                                                fontFamily: 'monospace',
                                                                textAlign: 'center'
                                                            }}
                                                        />
                                                        <span style={{ fontSize: '1.2rem', fontWeight: 'bold' }}>/</span>
                                                        <input
                                                            type="text"
                                                            className="form-input"
                                                            value={newCard.expiry_year ? String(newCard.expiry_year).slice(-2) : ''}
                                                            onChange={(e) => {
                                                                let value = e.target.value.replace(/\D/g, '');
                                                                if (value.length > 2) value = value.slice(0, 2);
                                                                if (value.length === 2) {
                                                                    setNewCard({...newCard, expiry_year: parseInt('20' + value)});
                                                                } else {
                                                                    setNewCard({...newCard, expiry_year: value});
                                                                }
                                                            }}
                                                            placeholder="YY"
                                                            maxLength="2"
                                                            required
                                                            style={{ 
                                                                fontSize: '1.1rem',
                                                                fontFamily: 'monospace',
                                                                textAlign: 'center'
                                                            }}
                                                        />
                                                    </div>
                                                </div>

                                                <div className="form-group">
                                                    <label className="form-label">CVV</label>
                                                    <input
                                                        type="text"
                                                        className="form-input"
                                                        value={newCard.cvv}
                                                        onChange={(e) => {
                                                            const value = e.target.value.replace(/\D/g, '').slice(0, 4);
                                                            setNewCard({...newCard, cvv: value});
                                                        }}
                                                        placeholder="123"
                                                        maxLength="4"
                                                        required
                                                        style={{ 
                                                            fontSize: '1.1rem',
                                                            fontFamily: 'monospace'
                                                        }}
                                                    />
                                                </div>
                                            </div>

                                            {/* 안전한 결제 안내 */}
                                            <div style={{ 
                                                background: '#e3f2fd', 
                                                borderRadius: '8px',
                                                padding: '1rem',
                                                marginTop: '1rem',
                                                marginBottom: '1.5rem'
                                            }}>
                                                <div style={{ fontSize: '0.85rem', color: '#1565c0' }}>
                                                    <strong>💡 안전한 결제:</strong> 모든 결제는 암호화되어 안전하게 처리됩니다. 
                                                    중복 결제 방지 시스템이 적용되어 있습니다.
                                                </div>
                                            </div>

                                            {/* 기본 카드 설정 */}
                                            <div className="form-group">
                                                <label style={{ 
                                                    display: 'flex', 
                                                    alignItems: 'center', 
                                                    gap: '0.5rem', 
                                                    cursor: 'pointer',
                                                    padding: '0.75rem',
                                                    background: '#f8f9fa',
                                                    borderRadius: '8px'
                                                }}>
                                                    <input
                                                        type="checkbox"
                                                        checked={newCard.is_default}
                                                        onChange={(e) => setNewCard({...newCard, is_default: e.target.checked})}
                                                        style={{ width: '18px', height: '18px' }}
                                                    />
                                                    <span style={{ fontWeight: 500 }}>기본 카드로 설정</span>
                                                </label>
                                            </div>

                                            <button type="submit" className="btn btn-primary" style={{ 
                                                marginTop: '1rem',
                                                padding: '1rem',
                                                fontSize: '1.1rem'
                                            }}>
                                                💳 카드 저장
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
}

// Payment API 연동 Checkout 컴포넌트
// index.html에 추가할 코드

// CheckoutModal 컴포넌트 (Payment API 연동 버전)
function CheckoutModal({ user, cart, totalPrice, onClose, onComplete }) {
    const [paymentMethod, setPaymentMethod] = useState('card');
    const [processing, setProcessing] = useState(false);
    const [error, setError] = useState('');
    const [success, setSuccess] = useState(false);
    const [paymentResult, setPaymentResult] = useState(null);
    
    // 저장된 카드 관련 state
    const [savedCards, setSavedCards] = useState([]);
    const [selectedCardId, setSelectedCardId] = useState(null);
    const [useNewCard, setUseNewCard] = useState(false);
    const [loadingCards, setLoadingCards] = useState(false);
    
    // 카드 정보 state
    const [cardNumber, setCardNumber] = useState('');
    const [cardHolder, setCardHolder] = useState('');
    const [expiry, setExpiry] = useState('');
    const [cvv, setCvv] = useState('');

    // 저장된 카드 로드
    useEffect(() => {
        const loadSavedCards = async () => {
            try {
                setLoadingCards(true);
                const cards = await API.getSavedCards();
                setSavedCards(cards);
                
                // 기본 카드가 있으면 자동 선택
                const defaultCard = cards.find(card => card.is_default);
                if (defaultCard) {
                    setSelectedCardId(defaultCard.card_id);
                    setUseNewCard(false);
                } else if (cards.length > 0) {
                    setSelectedCardId(cards[0].card_id);
                    setUseNewCard(false);
                } else {
                    setUseNewCard(true);
                }
            } catch (error) {
                console.error('카드 목록 로드 실패:', error);
                setUseNewCard(true);
            } finally {
                setLoadingCards(false);
            }
        };

        if (paymentMethod === 'card') {
            loadSavedCards();
        }
    }, [paymentMethod]);

    const handlePayment = async (e) => {
        e.preventDefault();
        setProcessing(true);
        setError('');

        try {
            // 1단계: Payment API로 주문 생성
            console.log('📝 주문 생성 중...');
            const userId = user.user_id || user.id;
            
            const orderItems = cart.map(item => ({
                product_id: item.id,
                quantity: item.quantity,
                price: item.price
            }));

            const orderResponse = await API.createPaymentOrder(
                userId,
                orderItems,
                totalPrice
            );

            console.log('✅ 주문 생성 완료:', orderResponse);
            const orderId = orderResponse.order_id;

            // 2단계: Payment API로 결제 처리
            console.log('💳 결제 처리 중...');
            
            // 카드 정보 준비 (카드 결제인 경우)
            let cardData = null;
            if (paymentMethod === 'card' || paymentMethod === 'credit_card') {
                if (useNewCard) {
                    // 새 카드 정보 사용
                    cardData = {
                        card_number: cardNumber.replace(/\s/g, ''),
                        card_holder: cardHolder,
                        expiry: expiry,
                        cvv: cvv
                    };
                } else if (selectedCardId) {
                    // 저장된 카드 사용 - CVV만 입력받음
                    const selectedCard = savedCards.find(c => c.card_id === selectedCardId);
                    if (!selectedCard) {
                        throw new Error('선택한 카드를 찾을 수 없습니다');
                    }
                    
                    if (!cvv) {
                        throw new Error('CVV를 입력해주세요');
                    }
                    
                    // 저장된 카드 정보 + CVV
                    cardData = {
                        card_number: '************' + selectedCard.last_four_digits, // 마지막 4자리만
                        card_holder: selectedCard.card_holder,
                        expiry: `${String(selectedCard.expiry_month).padStart(2, '0')}/${String(selectedCard.expiry_year).slice(-2)}`,
                        cvv: cvv,
                        saved_card_id: selectedCardId // 저장된 카드 ID 전달
                    };
                    
                    console.log('💳 저장된 카드 사용:', {
                        card_id: selectedCardId,
                        last_four: selectedCard.last_four_digits,
                        card_holder: selectedCard.card_holder,
                        expiry: cardData.expiry
                    });
                }
            }
            
            if (cardData) {
                console.log('💳 카드 데이터 전송:', {
                    card_number: cardData.card_number,
                    card_holder: cardData.card_holder,
                    expiry: cardData.expiry,
                    has_cvv: !!cardData.cvv,
                    saved_card_id: cardData.saved_card_id
                });
            }
            
            const paymentResponse = await API.processPayment(
                orderId,
                paymentMethod === 'card' ? 'credit_card' : paymentMethod,
                cardData
            );

            console.log('✅ 결제 완료:', paymentResponse);

            // 결제 성공
            if (paymentResponse.success && paymentResponse.status === 'completed') {
                setSuccess(true);
                setPaymentResult({
                    orderId: orderId,
                    paymentId: paymentResponse.payment_id,
                    transactionId: paymentResponse.transaction_id,
                    amount: totalPrice
                });

                // 사용자 행동 트래킹
                trackUserAction('payment_completed', {
                    orderId: orderId,
                    paymentId: paymentResponse.payment_id,
                    amount: totalPrice,
                    method: paymentMethod
                });

                // 3초 후 완료 처리
                setTimeout(() => {
                    onComplete();
                }, 3000);
            } else {
                throw new Error(paymentResponse.message || '결제 처리에 실패했습니다');
            }

        } catch (error) {
            console.error('❌ 결제 실패:', error);
            setError(error.message || '결제 처리 중 오류가 발생했습니다');
            
            trackUserAction('payment_failed', {
                error: error.message,
                method: paymentMethod
            });
        } finally {
            setProcessing(false);
        }
    };

    // 결제 성공 화면
    if (success && paymentResult) {
        return (
            <div className="modal">
                <div className="modal-content">
                    <div style={{ textAlign: 'center', padding: '2rem' }}>
                        <div style={{ fontSize: '4rem', marginBottom: '1rem' }}>✅</div>
                        <h2 style={{ color: '#2ecc71', marginBottom: '1rem' }}>결제 완료!</h2>
                        <p style={{ color: '#666', marginBottom: '2rem' }}>
                            주문이 성공적으로 처리되었습니다
                        </p>
                        
                        <div style={{ 
                            background: '#f8f9fa', 
                            padding: '1.5rem', 
                            borderRadius: '10px',
                            textAlign: 'left',
                            marginBottom: '1.5rem'
                        }}>
                            <div style={{ marginBottom: '0.75rem' }}>
                                <strong>주문 번호:</strong> {paymentResult.orderId}
                            </div>
                            <div style={{ marginBottom: '0.75rem' }}>
                                <strong>결제 ID:</strong> {paymentResult.paymentId}
                            </div>
                            <div style={{ marginBottom: '0.75rem' }}>
                                <strong>거래 ID:</strong> {paymentResult.transactionId}
                            </div>
                            <div>
                                <strong>결제 금액:</strong> ₩{paymentResult.amount.toLocaleString()}
                            </div>
                        </div>

                        <p style={{ fontSize: '0.9rem', color: '#999' }}>
                            잠시 후 자동으로 닫힙니다...
                        </p>
                    </div>
                </div>
            </div>
        );
    }

    // 결제 진행 화면
    return (
        <div className="modal">
            <div className="modal-content">
                <div className="modal-header">
                    <h2 className="modal-title">💳 결제하기</h2>
                    <button className="close-btn" onClick={onClose} disabled={processing}>×</button>
                </div>

                {error && (
                    <div className="alert alert-error">
                        {error}
                    </div>
                )}

                <form onSubmit={handlePayment}>
                    {/* 주문 요약 */}
                    <div style={{ marginBottom: '2rem' }}>
                        <h3 style={{ marginBottom: '1rem' }}>주문 요약</h3>
                        {cart.map(item => (
                            <div key={item.id} style={{ 
                                display: 'flex', 
                                justifyContent: 'space-between',
                                padding: '0.75rem 0',
                                borderBottom: '1px solid #e9ecef'
                            }}>
                                <span>{item.name} x {item.quantity}</span>
                                <span>₩{(item.price * item.quantity).toLocaleString()}</span>
                            </div>
                        ))}
                        <div style={{ 
                            display: 'flex', 
                            justifyContent: 'space-between',
                            padding: '1rem 0',
                            fontSize: '1.2rem',
                            fontWeight: 'bold',
                            color: '#667eea'
                        }}>
                            <span>총 결제 금액</span>
                            <span>₩{totalPrice.toLocaleString()}</span>
                        </div>
                    </div>

                    {/* 배송 정보 */}
                    <div style={{ marginBottom: '2rem' }}>
                        <h3 style={{ marginBottom: '1rem' }}>배송 정보</h3>
                        <div style={{ background: '#f8f9fa', padding: '1rem', borderRadius: '8px' }}>
                            <div style={{ marginBottom: '0.5rem' }}>
                                <strong>받는 사람:</strong> {user.name}
                            </div>
                            <div style={{ marginBottom: '0.5rem' }}>
                                <strong>연락처:</strong> {user.phone || '미등록'}
                            </div>
                            <div>
                                <strong>배송지:</strong> {user.address || '미등록'}
                            </div>
                        </div>
                    </div>

                    {/* 결제 수단 선택 */}
                    <div className="payment-section">
                        <h3 style={{ marginBottom: '1rem' }}>결제 수단</h3>
                        <div className="payment-method">
                            <div 
                                className={`payment-option ${paymentMethod === 'card' ? 'selected' : ''}`}
                                onClick={() => setPaymentMethod('card')}
                            >
                                <div style={{ fontSize: '2rem', marginBottom: '0.5rem' }}>💳</div>
                                <div>신용/체크카드</div>
                            </div>
                            <div 
                                className={`payment-option ${paymentMethod === 'bank_transfer' ? 'selected' : ''}`}
                                onClick={() => setPaymentMethod('bank_transfer')}
                            >
                                <div style={{ fontSize: '2rem', marginBottom: '0.5rem' }}>🏦</div>
                                <div>계좌이체</div>
                            </div>
                            <div 
                                className={`payment-option ${paymentMethod === 'mobile' ? 'selected' : ''}`}
                                onClick={() => setPaymentMethod('mobile')}
                            >

                                                            setExpiry(value);

                                                    onChange={(e) => {

                                                        if (value.length <= 4) {
                                                            setCvv(value);
                                                        }
                                                    }}
                                                    maxLength="4"
                                                    required
                                                />
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        <div style={{

                            fontSize: '0.9rem',
                            color: '#004085',
                            marginTop: '1rem'
                        }}>
                            <strong>💡 안전한 결제:</strong> 모든 결제는 암호화되어 안전하게 처리됩니다.

                    <div style={{ display: 'flex', gap: '1rem', marginTop: '2rem' }}>
                        <button 
                            type="button"
                            className="btn btn-secondary"
                            onClick={onClose}

                            style={{ flex: 1 }}
                        >
                            취소
                        </button>
                        <button 
                            type="submit"
                            className="btn btn-success"
                            disabled={processing}
                            style={{ flex: 2 }}
                        >
                            {processing ? '결제 처리 중...' : `₩${totalPrice.toLocaleString()} 결제하기`}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    );
}

        // 상품 관리
        function ProductManagement({ products, setProducts, reloadProducts }) {
             const [editProduct, setEditProduct] = useState(null);
             const [showAddForm, setShowAddForm] = useState(false);

         const fetchProducts = async () => {
    if (reloadProducts) {
        await reloadProducts();
    } else {
        // Fallback: 직접 API 호출
        const res = await fetch(`${API_BASE_URL}/products`);
        const data = await res.json();
        setProducts(data.products || data || []);  // ✅ 이렇게 수정!
    }
};

    const handleDelete = async (id) => {
        if (!confirm("정말 삭제하시겠습니까?")) return;

        try {
            console.log(`🗑️ 상품 삭제 중... ID: ${id}`);
            const res = await fetch(`${API_BASE_URL}/products/${id}`, {
                method: "DELETE",
            });

            const data = await res.json();

            if (data.success) {
                console.log('✅ 삭제 성공!');
                alert("삭제되었습니다!");
                await fetchProducts(); // ✅ 삭제 후 목록 새로고침
            } else {
                console.error('❌ 삭제 실패:', data);
                alert("삭제 실패");
            }
        } catch (error) {
            console.error('❌ 삭제 요청 실패:', error);
            alert('삭제 중 오류가 발생했습니다.');
        }
    };


    // 상품 수정
    const handleSave = async (product) => {
        try {
            console.log('📝 상품 수정 중...', product);
            
            const formData = new FormData();
            formData.append("name", product.name);
            formData.append("description", product.description);
            formData.append("category", product.category);
            formData.append("price", product.price);
            formData.append("stock", product.stock);

            if (product.file) {
                formData.append("image", product.file);
            }

            const res = await fetch(`${API_BASE_URL}/products/${product.id}`, {
                method: "PUT",
                body: formData,
            });

            const data = await res.json();

            if (data.success) {
                console.log('✅ 수정 성공!');
                alert("수정되었습니다!");
                setEditProduct(null);
                await fetchProducts(); // ✅ 수정 후 목록 새로고침
            } else {
                console.error('❌ 수정 실패:', data);
                alert("수정 실패");
            }
        } catch (error) {
            console.error('❌ 수정 요청 실패:', error);
            alert('수정 중 오류가 발생했습니다.');
        }
    };


    // 상품 추가
    const handleAdd = async (product) => {
        try {
            console.log('➕ 상품 추가 중...', product);
            
            const formData = new FormData();
            formData.append("name", product.name);
            formData.append("description", product.description);
            formData.append("category", product.category);
            formData.append("price", product.price);
            formData.append("stock", product.stock);

            if (product.file) {
                console.log('📷 이미지 포함:', product.file.name);
                formData.append("image", product.file);
            }

            console.log('📤 API 요청 전송:', `${API_BASE_URL}/products`);
            const res = await fetch(`${API_BASE_URL}/products`, {
                method: "POST",
                body: formData,
            });

            const data = await res.json();
            console.log('📥 API 응답:', data);

            if (data.success) {
                console.log('✅ 추가 성공!');
                alert("상품이 추가되었습니다!");
                setShowAddForm(false);
                await fetchProducts(); // ✅ 추가 후 목록 새로고침
            } else {
                console.error('❌ 추가 실패:', data);
                alert("추가 실패: " + (data.message || '알 수 없는 오류'));
            }
        } catch (error) {
            console.error('❌ 추가 요청 실패:', error);
            alert('추가 중 오류가 발생했습니다: ' + error.message);
        }
    };


    return (
        <>
            <div className="admin-header">
                <div className="admin-title">📦 상품 관리</div>
                <button className="btn btn-primary" onClick={() => setShowAddForm(true)}>
                    + 상품 추가
                </button>
            </div>

            <table className="table">
                <thead>
                    <tr>
                        <th>사진</th>
                        <th>상품명</th>
                        <th>카테고리</th>
                        <th>가격</th>
                        <th>재고</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    {products.map(product => (
                        <tr key={product.id}>
                            
                            {/* ⬇⬇⬇ 이미지 표시 부분 (완성본) */}
                            <td>
                                {product.image_url ? (
                                    <img
                                        src={product.image_url}
                                        style={{
                                            width: "50px",
                                            height: "50px",
                                            objectFit: "cover",
                                            borderRadius: "6px"
                                        }}
                                    />
                                ) : (
                                    <span style={{ fontSize: "2rem" }}>📦</span>
                                )}
                            </td>
                            {/* ⬆⬆⬆ */}

                            <td>{product.name}</td>
                            <td>{product.category}</td>
                            <td>₩{product.price.toLocaleString()}</td>
                            <td>{product.stock}</td>

                            <td>
                                <button
                                    className="action-btn btn-edit"
                                    onClick={() => setEditProduct(product)}
                                >
                                    수정
                                </button>
                                <button
                                    className="action-btn btn-delete"
                                    onClick={() => handleDelete(product.id)}
                                >
                                    삭제
                                </button>
                            </td>
                        </tr>
                    ))}
                </tbody>
            </table>

            {(editProduct || showAddForm) && (
                <ProductEditModal
                    product={editProduct}
                    onSave={editProduct ? handleSave : handleAdd}
                    onClose={() => {
                        setEditProduct(null);
                        setShowAddForm(false);
                    }}
                />
            )}
        </>
    );
}




// ⬇⬇⬇ 상품 추가/수정 모달 전체 완성본
function ProductEditModal({ product, onSave, onClose }) {
    const [formData, setFormData] = useState(product || {
        name: "",
        description: "",
        price: 0,
        stock: 0,
        category: "",
        file: null,
        image_url: ""
    });

    const handleSubmit = (e) => {
        e.preventDefault();
        onSave({
            ...formData,
            price: parseInt(formData.price),
            stock: parseInt(formData.stock)
        });
    };

    return (
        <div className="modal" onClick={onClose}>
            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <div className="modal-header">
                    <div className="modal-title">
                        {product ? "상품 수정" : "상품 추가"}
                    </div>
                    <button className="close-btn" onClick={onClose}>✕</button>
                </div>

                <form onSubmit={handleSubmit}>

                    {/* 이미지 업로드 필드 */}
                    <div className="form-group">
                        <label className="form-label">상품 이미지</label>
                        {/* 기존이미지*/}
                        {formData.image_url && (
                            <img
                                src={formData.image_url}
                                style={{
                                    width: "80px",
                                    borderRadius: "8px",
                                    marginBottom: "8px"
                                }}
                            />
                        )}

                        <input
                            type="file"
                            accept="image/*"
                            onChange={(e) =>
                                setFormData({ ...formData, file: e.target.files[0] })
                            }
                            className="form-input"
                        />
                    </div>

                    <div className="form-group">
                        <label className="form-label">상품명</label>
                        <input
                            type="text"
                            className="form-input"
                            value={formData.name}
                            onChange={(e) =>
                                setFormData({ ...formData, name: e.target.value })
                            }
                            required
                        />
                    </div>

                    <div className="form-group">
                        <label className="form-label">설명</label>
                        <input
                            type="text"
                            className="form-input"
                            value={formData.description}
                            onChange={(e) =>
                                setFormData({ ...formData, description: e.target.value })
                            }
                            required
                        />
                    </div>

                    <div className="form-group">
                        <label className="form-label">카테고리</label>
                        <input
                            type="text"
                            className="form-input"
                            value={formData.category}
                            onChange={(e) =>
                                setFormData({ ...formData, category: e.target.value })
                            }
                            required
                        />
                    </div>

                    <div className="form-group">
                        <label className="form-label">가격</label>
                        <input
                            type="number"
                            className="form-input"
                            value={formData.price}
                            onChange={(e) =>
                                setFormData({ ...formData, price: e.target.value })
                            }
                            required
                        />
                    </div>

                    <div className="form-group">
                        <label className="form-label">재고</label>
                        <input
                            type="number"
                            className="form-input"
                            value={formData.stock}
                            onChange={(e) =>
                                setFormData({ ...formData, stock: e.target.value })
                            }
                            required
                        />
                    </div>

                    <button type="submit" className="btn btn-primary">
                        {product ? "수정 완료" : "추가 완료"}
                    </button>
                </form>
            </div>
        </div>
    );
}

        // 주문 관리
        function OrderManagement({ orders, setOrders }) {
            
            // 주문 상태 변경 핸들러
            const handleStatusUpdate = async (orderId, newStatus) => {
        if(!confirm(`주문 상태를 '${newStatus}'(으)로 변경하시겠습니까?`)) return;
                
                try {
            const res = await API.updateOrderStatus(orderId, newStatus);
            if(res.success) {
                alert("상태가 변경되었습니다.");
                // 화면 즉시 반영 (API 재호출 없이 로컬 상태 업데이트)
                const updatedOrders = orders.map(order => 
                    order.id === orderId ? { ...order, status: newStatus } : order
                );
                setOrders(updatedOrders);
            } else {
                alert("변경 실패");
            }
        } catch(err) {
            console.error(err);
            alert("오류 발생");
        }
    };
            const statusOptions = [
        { value: 'paid', label: '결제완료' },
        { value: 'preparing', label: '상품준비중' },
        { value: 'shipping', label: '배송중' },
        { value: 'delivered', label: '배송완료' },
        { value: 'cancelled', label: '취소됨' }
    ];
            return (
        <>
            <div className="admin-header">
                <div className="admin-title">🛍️ 주문 관리</div>
            </div>

            <table className="table">
                <thead>
                    <tr>
                        <th>주문 ID</th>
                        <th>고객 ID</th>
                        <th>금액</th>
                        <th>현재 상태</th>
                        <th>상태 변경</th>
                        <th>주문일</th>
                    </tr>
                </thead>
                <tbody>
                    {orders.map(order => (
                        <tr key={order.id}>
                            <td>{order.id}</td>
                            <td>{order.user_id}</td>
                            <td>₩{parseInt(order.total_price).toLocaleString()}</td>
                            <td>
                                <span className={`status-badge status-${order.status === 'paid' ? 'completed' : order.status}`}>
                                    {order.status}
                                </span>
                            </td>
                            <td>
                                <select 
                                    value={order.status} 
                                    onChange={(e) => handleStatusUpdate(order.id, e.target.value)}
                                    style={{ padding: '5px', borderRadius: '4px' }}
                                >
                                    {statusOptions.map(opt => (
                                        <option key={opt.value} value={opt.value}>
                                            {opt.label}
                                        </option>
                                    ))}
                                </select>
                            </td>
                            <td>{new Date(order.created_at || order.createdAt).toLocaleString()}</td>
                        </tr>
                    ))}
                </tbody>
            </table>
        </>
    );
}

        // 회원 관리
        function UserManagement({ users }) {
            return (
                <>
                    <div className="admin-header">
                        <div className="admin-title">👥 회원 관리</div>
                    </div>

                    <table className="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>이름</th>
                                <th>이메일</th>
                                <th>전화번호</th>
                                <th>권한</th>
                                <th>가입일</th>
                            </tr>
                        </thead>
                        <tbody>
                            {users.map(user => (
                                <tr key={user.id}>
                                    <td>{user.id}</td>
                                    <td>{user.name}</td>
                                    <td>{user.email}</td>
                                    <td>{user.phone || '-'}</td>
                                    <td>
                                        <span className={`status-badge ${
                                            user.role === 'super_admin' ? 'status-success' : 
                                            user.role === 'admin' ? 'status-completed' : 
                                            'status-pending'
                                        }`}>
                                            {user.role === 'super_admin' ? '🌟 최고 관리자' : 
                                             user.role === 'admin' ? '관리자' : 
                                             '일반'}
                                        </span>
                                    </td>
                                    <td>{user.createdAt ? new Date(user.createdAt).toLocaleDateString() : '-'}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </>
            );
        }

        // 메인 앱
        function App() {
            const [currentPage, setCurrentPage] = useState('login');
            const [currentUser, setCurrentUser] = useState(null);

            useEffect(() => {
                // 세션 체크
                const savedUser = sessionStorage.getItem('megapang_user');
                if (savedUser) {
                    const user = JSON.parse(savedUser);
                    setCurrentUser(user);
                    // admin 또는 super_admin이면 관리자 페이지로 이동
                    setCurrentPage((user.role === 'admin' || user.role === 'super_admin') ? 'admin' : 'shop');
                }
            }, []);

            const handleLogin = (user) => {
                console.log('🔐 로그인 처리:', { 
                    이름: user.name, 
                    이메일: user.email, 
                    권한: user.role 
                });
                
                setCurrentUser(user);
                sessionStorage.setItem('megapang_user', JSON.stringify(user));
                
                // admin 또는 super_admin이면 관리자 페이지로, 그 외에는 쇼핑몰로
                if (user.role === 'admin' || user.role === 'super_admin') {
                    console.log('✅ 관리자 페이지로 이동');
                    setCurrentPage('admin');
                } else {
                    console.log('✅ 일반 사용자 페이지로 이동');
                    setCurrentPage('shop');
                }
            };

            const handleRegister = (user) => {
                setCurrentPage('login');
            };

            const handleLogout = () => {
                setCurrentUser(null);
                sessionStorage.removeItem('megapang_user');
                TokenManager.removeToken(); // JWT 토큰 제거
                setCurrentPage('login');
                trackUserAction('logout', { userId: currentUser?.id });
            };

            if (currentPage === 'login') {
                return <LoginPage onLogin={handleLogin} onSwitchToRegister={() => setCurrentPage('register')} />;
            }

            if (currentPage === 'register') {
                return <RegisterPage onRegister={handleRegister} onSwitchToLogin={() => setCurrentPage('login')} />;
            }

            if (currentPage === 'shop') {
                return <ProductList user={currentUser} onLogout={handleLogout} />;
            }

            if (currentPage === 'admin') {
                return <AdminDashboard user={currentUser} onLogout={handleLogout} />;
            }
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
